<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Register | SociaFix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.auth-box{
  background:#fff;
  padding:25px;
  width:100%;
  max-width:420px;
  border-radius:10px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

h2{text-align:center;margin-bottom:15px;color:#203a43;}

input, select, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:#ff6b6b;
  border:none;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{background:#ff4c4c;}

.toggle, .forgot{
  text-align:center;
  margin-top:8px;
  color:#203a43;
  cursor:pointer;
  font-weight:bold;
  font-size:14px;
}

.forgot{color:#ff6b6b;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="auth-box">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="forgot" onclick="showForgot()">Forgot Password?</p>
    <p class="toggle" onclick="toggleForm()">No account? Register</p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="hidden">
    <h2>Register</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <select id="role">
      <option value="">Select Role</option>
      <option value="freelancer">Freelancer</option>
      <option value="client">Client</option>
      <option value="merchant">Merchant</option>
      <option value="buyer">Buyer</option>
    </select>

    <button onclick="register()">Register</button>
    <p class="toggle" onclick="toggleForm()">Already have an account? Login</p>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="forgotBox" class="hidden">
    <h2>Reset Password</h2>
    <input type="email" id="forgotEmail" placeholder="Enter your email">
    <input type="password" id="newPassword" placeholder="New Password">
    <button onclick="resetPassword()">Reset Password</button>
    <p class="toggle" onclick="backToLogin()">Back to Login</p>
  </div>

</div>

<script>
const USERS_KEY = 'sociafix_users';
const SESSION_KEY = 'sociafix_user';

function toggleForm(){
  loginBox.classList.toggle('hidden');
  registerBox.classList.toggle('hidden');
  forgotBox.classList.add('hidden');
}

function showForgot(){
  loginBox.classList.add('hidden');
  registerBox.classList.add('hidden');
  forgotBox.classList.remove('hidden');
}

function backToLogin(){
  forgotBox.classList.add('hidden');
  loginBox.classList.remove('hidden');
}

// -------- REGISTER --------
function register(){
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const role = document.getElementById('role').value;

  if(!name || !email || !password || !role){
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];

  if(users.some(u=>u.email===email)){
    alert("Email already exists");
    return;
  }

  users.push({ name,email,password,role,bio:"",company:"",profilePic:"",jobs:[],notifications:[] });

  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  localStorage.setItem(SESSION_KEY, JSON.stringify({ name,email,role }));

  redirectUser(role);
}

// -------- LOGIN --------
function login(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];

  const user = users.find(u=>u.email===email && u.password===password);

  if(!user){
    alert("Invalid login");
    return;
  }

  localStorage.setItem(SESSION_KEY, JSON.stringify(user));
  redirectUser(user.role);
}

// -------- RESET PASSWORD --------
function resetPassword(){
  const email = document.getElementById('forgotEmail').value.trim();
  const newPass = document.getElementById('newPassword').value.trim();

  if(!email || !newPass){
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];

  const index = users.findIndex(u=>u.email === email);

  if(index === -1){
    alert("Email not found");
    return;
  }

  users[index].password = newPass;
  localStorage.setItem(USERS_KEY, JSON.stringify(users));

  alert("Password reset successful. You can now login.");
  backToLogin();
}

// -------- REDIRECT --------
function redirectUser(role){
  if(role==='freelancer') location.href='freelancer.html';
  if(role==='client') location.href='client.html';
  if(role==='merchant') location.href='merchant.html';
  if(role==='buyer') location.href='buyer.html';
}
</script>

</body>
</html>
