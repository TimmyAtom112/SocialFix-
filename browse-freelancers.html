<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Freelancers | SociaFix</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0;}
.container { max-width:1000px; margin:40px auto; padding:20px; }
.freelancer-card { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.freelancer-card h3 { margin-bottom:5px; color:#203a43; }
.freelancer-card p { margin-bottom:5px; color:#555; }
.freelancer-card a { display:inline-block; margin-top:5px; padding:8px 12px; background:#ff6b6b; color:white; border-radius:5px; text-decoration:none; }
</style>
</head>
<body>

<div class="container">
  <h1>Browse Freelancers</h1>
  <div id="freelancersList"></div>
</div>

<script>
// ---------- GET ALL FREELANCERS ----------
const users = JSON.parse(localStorage.getItem("socialfix-users")) || [];
const freelancers = users.filter(u => u.role === "freelancer");

const container = document.getElementById("freelancersList");

if(freelancers.length === 0){
  container.innerHTML = "<p>No freelancers found.</p>";
} else {
  freelancers.forEach(f => {
    const div = document.createElement("div");
    div.className = "freelancer-card";
    div.innerHTML = `
      <h3>${f.name}</h3>
      <p>Email: ${f.email}</p>
      <p>Skills: ${f.skills ? f.skills.join(", ") : "Not set"}</p>
      <p>Location: ${f.location || "Not set"}</p>
      <a href="profile.html?email=${encodeURIComponent(f.email)}">View Profile</a>
    `;
    container.appendChild(div);
  });
}

// ---------- Optional: back button for client dashboard ----------
</script>

</body>
</html>
