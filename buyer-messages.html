<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | SociaFix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{display:flex;flex-direction:column;height:100vh;background:#f4f4f4;}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#203a43;
  color:white;
  padding:15px 30px;
}
.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}
.navbar a:hover{color:#ff6b6b;}

/* Main layout */
.main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* Sidebar */
.sidebar{
  width:30%;
  background:#fff;
  border-right:1px solid #ddd;
  overflow-y:auto;
}
.sidebar h2{
  padding:15px;
  background:#203a43;
  color:#fff;
}
.convo{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.convo:hover{background:#f1f1f1;}
.active{background:#eaf4ff;}

/* Chat area */
.chat-area{
  width:70%;
  display:flex;
  flex-direction:column;
}
.chat-header{
  padding:15px;
  background:#203a43;
  color:#fff;
}
.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.message{
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
  max-width:60%;
  word-wrap:break-word;
  font-size:14px;
}
.buyer{
  background:#2196F3;
  color:white;
  align-self:flex-end;
}
.merchant{
  background:#ddd;
  align-self:flex-start;
}

/* Input */
.chat-input{
  display:flex;
  padding:10px;
  background:#fff;
  border-top:1px solid #ddd;
}
.chat-input input{
  flex:1;
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
}
.chat-input button{
  margin-left:10px;
  padding:10px 15px;
  background:#203a43;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.chat-input button:hover{background:#162c33;}

/* Responsive */
@media (max-width:768px){
  .main{flex-direction:column;}
  .sidebar{width:100%; height:200px;}
  .chat-area{width:100%; flex:1;}
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <strong>SociaFix</strong>
  <div>
    <a href="buyer.html">Dashboard</a>
    <a href="buyer-messages.html">Messages</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</div>

<!-- Main Layout -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Conversations</h2>
    <div id="conversationList"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="chat-header" id="chatHeader">Select a conversation</div>
    <div class="messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- JS -->
<script src="buyer-messages.js" defer></script>
</body>
</html>
